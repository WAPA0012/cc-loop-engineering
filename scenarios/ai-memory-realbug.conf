# ai-memory 真 bug 场景
MODE="team"
# 注入了一个真实 bug：addArticle 的 hash 从 summary 改成了 tags.join()
# 导致重复检测逻辑错误

PROJECT_DIR="/mnt/d/桌面文件夹/ai-memory--副本实验"

GOAL="用户报告：addArticle 的重复检测坏了。当用相同内容、不同标签调用 addArticle 时，系统没有识别为重复，而是创建了新节点。预期行为：相同 summary 的文章应该被识别为重复（返回 duplicate:true）。请定位根因并修复。"

VERIFY_CMD="node --test eval/test-engine.mjs eval/test-html.mjs eval/test-errors.mjs eval/test-index.mjs"
VERIFY_TYPE="test"
SUCCESS_CRITERIA="pass>=85"

MAX_ROUNDS=8
